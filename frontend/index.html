<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Zet AI</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/tokyo-night-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

<style>
/* --- VARIABLES & RESET --- */
:root {
  --bg-deep: #0b0f19;
  --bg-sidebar: #111827;
  --bg-surface: #1f2937;
  --bg-surface-hover: #374151;
  --primary-gradient: linear-gradient(135deg, #4c8bf5 0%, #d96570 100%);
  --user-gradient: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
  --glass: rgba(31, 41, 55, 0.7);
  --border: rgba(255, 255, 255, 0.08);
  --text-main: #f3f4f6;
  --text-sub: #9ca3af;
  --shadow: 0 10px 40px -10px rgba(0,0,0,0.5);
  --glow: 0 0 20px rgba(139, 92, 246, 0.3);
}

* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: 'Outfit', sans-serif;
  background: var(--bg-deep);
  color: var(--text-main);
  display: flex;
  height: 100vh;
  overflow: hidden;
}

/* Custom Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #374151; border-radius: 10px; }
::-webkit-scrollbar-thumb:hover { background: #4b5563; }

/* --- SIDEBAR --- */
aside {
  width: 280px;
  background: var(--bg-sidebar);
  display: flex;
  flex-direction: column;
  border-right: 1px solid var(--border);
  transition: width 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
  z-index: 100;
  box-shadow: 5px 0 15px rgba(0,0,0,0.2);
}

aside.collapsed { width: 72px; }
aside.collapsed .nav-text, aside.collapsed .recent-label, aside.collapsed #history, aside.collapsed .menu-title { display: none; }
.sidebar-header {
  padding: 16px;
  display: flex;
  align-items: center;
  height: 72px;
}

.menu-btn {
  background: transparent;
  border: none;
  color: var(--text-sub);
  width: 40px;
  height: 40px;
  border-radius: 50%;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  transition: all 0.2s ease;
}
.menu-btn {
  display: flex;
  align-items: center;
  gap: 10px;
  font-family: 'Outfit', sans-serif;
  font-weight: 600;
}

.menu-title {
  font-size: 16px;
  background: linear-gradient(to right, #fff, #aaa);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.menu-btn:hover { background: var(--bg-surface); color: #fff; }

.sidebar-scrollable {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.new-chat-btn {
  background: var(--bg-surface);
  color: var(--text-main);
  border: 1px solid var(--border);
  height: 44px;
  margin: 0 16px 20px 16px;
  width: calc(100% - 32px);
  border-radius: 22px;
  cursor: pointer;
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 12px;
  font-size: 15px;
  font-weight: 600;
  transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
  overflow: hidden;
}

.new-chat-btn:hover {
  background: var(--primary-gradient);
  border-color: transparent;
  box-shadow: var(--glow);
  color: #fff;
  transform: translateY(-1px);
}

aside.collapsed .new-chat-btn { width: 40px; padding: 0; justify-content: center; }

.recent-label {
  padding: 0 24px 10px 24px;
  font-size: 13px;
  color: var(--text-sub);
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

#history {
  flex: 1;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 4px;
  padding: 0 12px;
}

.history-item {
  padding: 12px 14px;
  border-radius: 10px;
  cursor: pointer;
  font-size: 14px;
  color: var(--text-sub);
  display: flex;
  justify-content: space-between;
  align-items: center;
  transition: all 0.2s ease;
  white-space: nowrap;
  overflow: hidden;
}

.history-item:hover { background: var(--bg-surface); color: #fff; }
.history-item.active {
  background: rgba(139, 92, 246, 0.1);
  border: 1px solid rgba(139, 92, 246, 0.3);
  color: #c4b5fd;
  font-weight: 500;
}

.delete-btn {
  opacity: 0;
  background: none;
  border: none;
  color: var(--text-sub);
  cursor: pointer;
  transition: 0.2s;
  padding: 5px;
}
.history-item:hover .delete-btn { opacity: 1; }
.delete-btn:hover { color: #f87171; transform: scale(1.1); }

.sidebar-footer { padding: 16px; margin-top: auto; }

.settings-btn {
  background: transparent;
  border: none;
  color: var(--text-sub);
  height: 40px;
  width: 100%;
  border-radius: 10px;
  cursor: pointer;
  display: flex;
  align-items: center;
  padding: 0 12px;
  gap: 12px;
  font-size: 15px;
  font-weight: 500;
  transition: all 0.2s;
  overflow: hidden;
  font-family: inherit;
}
.settings-btn:hover { background: var(--bg-surface); color: #fff; }
aside.collapsed .settings-btn { width: 40px; padding: 0; justify-content: center; }

/* --- MAIN CHAT AREA --- */
main {
  flex: 1;
  display: flex;
  flex-direction: column;
  position: relative;
  background-color: var(--bg-deep);
  overflow: hidden;
}

/* Background Animated Orbs */
main::before, main::after {
  content: '';
  position: absolute;
  width: 70%; height: 70%;
  filter: blur(60px); z-index: 0;
  pointer-events: none;
}
main::before {
  top: -20%; left: -10%;
  background: radial-gradient(circle, rgba(139, 92, 246, 0.15) 0%, transparent 60%);
  animation: floatOrb 10s infinite alternate ease-in-out;
}
main::after {
  bottom: -20%; right: -10%; width: 60%; height: 60%;
  background: radial-gradient(circle, rgba(6, 182, 212, 0.1) 0%, transparent 60%);
  animation: floatOrb 8s infinite alternate-reverse ease-in-out;
}
@keyframes floatOrb { 0% { transform: translate(0, 0); } 100% { transform: translate(50px, 50px); } }

#chat {
  flex: 1;
  overflow-y: auto;
  padding: 40px 20px 120px 20px; 
  display: flex;
  flex-direction: column;
  align-items: center;
  scroll-behavior: smooth;
  z-index: 1;
}

.welcome-screen { text-align: center; margin-top: 15vh; animation: fadeInDown 0.8s cubic-bezier(0.2, 0.8, 0.2, 1); }
@keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
.welcome-screen h1 { font-size: 48px; font-weight: 700; background: var(--primary-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 15px; letter-spacing: -1px; }
.welcome-screen p { color: var(--text-sub); font-size: 18px; }

/* --- MESSAGES & BUTTONS --- */
.msg {
  width: 100%;
  max-width: 800px;
  display: flex;
  gap: 16px;
  margin-bottom: 32px;
  animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
  position: relative; 
  padding-right: 50px; 
}
@keyframes popIn { 0% { opacity: 0; transform: translateY(20px) scale(0.95); } 100% { opacity: 1; transform: translateY(0) scale(1); } }

.msg-copy-btn {
  position: absolute;
  top: 0px;
  right: 0px;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-sub);
  border-radius: 8px;
  padding: 6px 12px;
  font-size: 13px;
  cursor: pointer;
  opacity: 0;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 6px;
}
.msg:hover .msg-copy-btn { opacity: 1; }
.msg-copy-btn:hover { background: var(--bg-surface-hover); color: #fff; border-color: #8b5cf6; }

.avatar {
  width: 38px; height: 38px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; box-shadow: 0 4px 10px rgba(0,0,0,0.3); z-index: 2;
}
.user-avatar { background: var(--bg-surface); border: 1px solid var(--border); color: #fff; }
.bot-avatar { background: var(--primary-gradient); color: #fff; }

.content { line-height: 1.6; font-size: 16px; color: var(--text-main); overflow-wrap: break-word; max-width: calc(100% - 54px); width: 100%; }

.msg.user { flex-direction: row-reverse; padding-left: 50px; padding-right: 0; }
.msg.user .msg-copy-btn { right: auto; left: 0; }
.msg.user .content { 
  background: var(--user-gradient); 
  padding: 12px 20px; 
  border-radius: 20px 20px 4px 20px; 
  color: #fff; 
  box-shadow: 0 4px 15px rgba(59, 130, 246, 0.2); 
  width: fit-content; 
}
.msg.bot { flex-direction: row; }
.msg.bot .content { padding: 4px 0; }

/* --- CODE BLOCKS UI --- */
.content h1, .content h2, .content h3 { margin-top: 15px; margin-bottom: 10px; color: #fff; }
.content p { margin-bottom: 12px; margin-top: 0; }
.content p:last-child { margin-bottom: 0; }
.content code { background: rgba(255,255,255,0.1); padding: 3px 6px; border-radius: 6px; font-family: 'Consolas', monospace; font-size: 0.9em; color: #a78bfa; }

.code-container {
  background: #111827;
  border: 1px solid var(--border);
  border-radius: 12px;
  margin: 16px 0;
  overflow: hidden;
  box-shadow: 0 4px 15px rgba(0,0,0,0.2);
}

.code-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: #1f2937;
  padding: 8px 16px;
  border-bottom: 1px solid var(--border);
}

.code-header span {
  font-size: 11px;
  font-weight: 700;
  color: #06b6d4;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.code-actions { display: flex; gap: 12px; }

.code-action-btn {
  background: transparent;
  border: none;
  color: var(--text-sub);
  font-size: 12px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 5px;
  transition: 0.2s;
  font-family: 'Outfit', sans-serif;
}

.code-action-btn:hover { color: #fff; }
.code-action-btn i.fa-play { color: #10b981; } 

.code-container pre { margin: 0; padding: 16px; background: transparent; border: none; overflow-x: auto; }
.code-container pre code { background: transparent; padding: 0; color: inherit; }

/* --- INPUT AREA --- */
.input-area {
  position: absolute; bottom: 0; left: 0; width: 100%; padding: 30px 20px;
  background: linear-gradient(to top, var(--bg-deep) 60%, transparent 100%);
  display: flex; justify-content: center; z-index: 10;
}
.input-container {
  width: 100%; max-width: 800px; background: var(--glass); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  display: flex; align-items: flex-end; /* Changed to flex-end so button stays at bottom */
  padding: 8px 10px 8px 24px; transition: all 0.3s ease;
}

.input-container textarea { 
  flex: 1; background: transparent; border: none; color: #fff; font-size: 16px; 
  outline: none; padding: 10px 0; font-family: inherit; 
  resize: none; 
  min-height: 24px; /* Set a minimum height instead of fixed */
  max-height: 150px; /* Limits how tall it can get before scrolling */
  overflow-y: auto; line-height: 24px;
}

.input-container textarea::placeholder { color: #6b7280; }
.send-btn { width: 44px; height: 44px; border-radius: 14px; border: none; background: #fff; color: var(--bg-deep); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; transition: all 0.2s; margin-left: 12px; }
.send-btn:hover:not(:disabled) { background: var(--primary-gradient); color: #fff; transform: scale(1.05) rotate(-10deg); box-shadow: var(--glow); }
.send-btn:disabled { background: var(--bg-surface-hover); color: #6b7280; cursor: not-allowed; }

/* Typing Animation */
.typing-indicator { display: flex; align-items: center; gap: 6px; padding: 12px 16px; background: var(--bg-surface); border-radius: 16px 16px 16px 4px; width: fit-content; border: 1px solid var(--border); }
.typing-dot { width: 6px; height: 6px; background: var(--text-sub); border-radius: 50%; animation: typingBounce 1.4s infinite ease-in-out both; }
.typing-dot:nth-child(1) { animation-delay: -0.32s; } .typing-dot:nth-child(2) { animation-delay: -0.16s; }
@keyframes typingBounce { 0%, 80%, 100% { transform: scale(0); opacity: 0.5; } 40% { transform: scale(1); opacity: 1; background: #8b5cf6; } }
</style>
</head>
<body>

<aside id="sidebar">
<div class="sidebar-header">
  <button class="menu-btn" onclick="toggleSidebar()">
    <i class="fas fa-bars"></i>
  </button>
  <span class="menu-title">Zet AI</span>
</div>

  <div class="sidebar-scrollable">
    <button class="new-chat-btn" onclick="newChat()">
      <i class="fas fa-plus"></i> <span class="nav-text">New Chat</span>
    </button>
    <div class="recent-label">Recent</div>
    <div id="history"></div>
  </div>

  <div class="sidebar-footer">
    <button class="settings-btn" onclick="openSettings()">
      <i class="fas fa-cog"></i> <span class="nav-text">Settings</span>
    </button>
  </div>
</aside>

<main>
  <div id="chat"></div>
  <div class="input-area">
    <div class="input-container">
   <textarea id="input" placeholder="Ask Zet anything..." autocomplete="off" rows="1" onkeydown="handleEnter(event)" oninput="autoResize(this)"></textarea>
      <button id="sendBtn" class="send-btn" onclick="send()"><i class="fas fa-arrow-up"></i></button>
    </div>
  </div>
</main>

<script>
function autoResize(textarea) {
  // Reset height to 'auto' first so it shrinks if the user deletes text
  textarea.style.height = 'auto';
  // Set the new height based on the scrollHeight
  textarea.style.height = textarea.scrollHeight + 'px';
}
function handleEnter(event) {
  if (event.key === 'Enter' && !event.shiftKey) {
    event.preventDefault(); // Prevents adding a new line
    send();
  }
}
// --- MARKED.JS CUSTOM RENDERER (For Copy/Run Buttons on Code) ---
function escapeHtml(unsafe) {
  if (typeof unsafe !== 'string') return unsafe;
  return unsafe.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
}

marked.use({
  renderer: {
    code: function(code, language) {
      let text = typeof code === 'object' ? code.text : code;
      let lang = typeof code === 'object' ? code.lang : language;
      lang = lang || 'plaintext';
      
      const lowerLang = lang.toLowerCase();
      
      // Only show the Run button for HTML and JavaScript
      const isRunnable = ['javascript', 'js', 'html', 'xml'].includes(lowerLang);
      
      const runButtonHTML = isRunnable 
        ? `<button class="code-action-btn" onclick="runCode(this, '${lang}')"><i class="fas fa-play"></i> Run</button>` 
        : '';

      return `
        <div class="code-container">
          <div class="code-header">
            <span>${lang}</span>
            <div class="code-actions">
              ${runButtonHTML}
              <button class="code-action-btn" onclick="copyCode(this)"><i class="far fa-copy"></i> Copy</button>
            </div>
          </div>
          <pre><code class="language-${lang}">${escapeHtml(text)}</code></pre>
        </div>
      `;
    }
  }
});

// --- BUTTON ACTIONS ---
function copyMessage(btn) {
  const rawText = decodeURIComponent(btn.getAttribute('data-raw'));
  navigator.clipboard.writeText(rawText).then(() => {
    const originalHTML = btn.innerHTML;
    btn.innerHTML = '<i class="fas fa-check"></i> Copied';
    btn.style.color = '#10b981';
    setTimeout(() => { btn.innerHTML = originalHTML; btn.style.color = ''; }, 2000);
  });
}

function copyCode(btn) {
  const container = btn.closest('.code-container');
  const code = container.querySelector('code').innerText;
  navigator.clipboard.writeText(code).then(() => {
    const originalHTML = btn.innerHTML;
    btn.innerHTML = '<i class="fas fa-check"></i> Copied!';
    btn.style.color = '#10b981';
    setTimeout(() => { btn.innerHTML = originalHTML; btn.style.color = ''; }, 2000);
  });
}

function runCode(btn, lang) {
  const container = btn.closest('.code-container');
  const code = container.querySelector('code').innerText;
  
  if (lang.toLowerCase() === 'javascript' || lang.toLowerCase() === 'js') {
    try {
      const originalLog = console.log;
      let output = [];
      console.log = (...args) => { output.push(args.join(' ')); };
      eval(code); 
      console.log = originalLog; 
      
      if (output.length > 0) alert("Output:\n" + output.join('\n'));
      else alert("Code executed successfully (No console output).");
    } catch (err) {
      alert("Error executing JavaScript:\n" + err);
    }
  } else if (lang.toLowerCase() === 'html') {
    const newWin = window.open();
    newWin.document.write(code);
    newWin.document.close();
  }
}

// --- UI LOGIC ---
function toggleSidebar() { document.getElementById("sidebar").classList.toggle("collapsed"); }
function openSettings() { alert("Settings panel coming soon!"); }
function saveChatToLocal() { localStorage.setItem("chatHTML", document.getElementById("chat").innerHTML); }

// --- API LOGIC ---
const API = "https://almas-fullstack.onrender.com/api";
let currentChat = null;
let isBusy = false;

window.onload = async () => {
  await loadHistory();
  const savedChat = localStorage.getItem("chatHTML");
  if (savedChat) {
    document.getElementById("chat").innerHTML = savedChat;
    document.getElementById("chat").querySelectorAll("pre code").forEach(block => hljs.highlightElement(block));
  } else {
    newChat(); 
  }
};

async function loadHistory() {
  try {
    const res = await fetch(API + "/chats");
    const chats = await res.json();
    const container = document.getElementById("history");
    container.innerHTML = "";
    chats.forEach(c => {
      const div = document.createElement("div");
      div.className = `history-item ${c.chatId === currentChat ? 'active' : ''}`;
      div.innerHTML = `
        <span style="overflow:hidden; text-overflow:ellipsis;">
          <i class="far fa-message" style="margin-right:10px; font-size:12px; opacity: 0.7;"></i>
          <span class="nav-text">${c.title || "New Conversation"}</span>
        </span>
        <button class="delete-btn" onclick="deleteChat('${c.chatId}', event)"><i class="fas fa-trash-alt"></i></button>
      `;
      div.onclick = () => loadChat(c.chatId);
      container.appendChild(div);
    });
  } catch (e) { console.error("Failed to load history", e); }
}

async function deleteChat(id, e) {
  e.stopPropagation();
  if(!confirm("Delete this chat?")) return;
  await fetch(API + "/chat/" + id, { method: "DELETE" });
  if (currentChat === id) newChat(); else loadHistory();
}

async function newChat() {
  currentChat = null;
  document.getElementById("chat").innerHTML = `
    <div class="welcome-screen">
      <h1>Hello, I am Zet.</h1>
      <p>How can I help you today?</p>
    </div>
  `;
  loadHistory();
}

async function loadChat(id) {
  currentChat = id; loadHistory(); 
  const res = await fetch(API + "/chat/" + id);
  const data = await res.json();
  const chatDiv = document.getElementById("chat");
  chatDiv.innerHTML = ""; 
  data.messages.forEach(m => appendMessage(m.role, m.content));
}

async function send() {
  const input = document.getElementById("input");
  const text = input.value.trim();
  if (!text || isBusy) return;

  isBusy = true; document.getElementById("sendBtn").disabled = true;
  const welcome = document.querySelector(".welcome-screen");
  if(welcome) welcome.remove();

  appendMessage("user", text);
  
  // CLEAR TEXT AND RESET HEIGHT
  input.value = "";
  input.style.height = "auto"; // <-- ADD THIS LINE

  const typingId = appendTyping();
  
  // ... rest of your send function

  try {
    if (!currentChat) {
      const newRes = await fetch(API + "/new-chat", { method: "POST" });
      const newData = await newRes.json();
      currentChat = newData.chatId;
    }
    const res = await fetch(API + "/chat", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ chatId: currentChat, message: text })
    });
    if (!res.ok) throw new Error(await res.text());
    
    const typingDiv = document.getElementById(typingId);
    if(typingDiv) typingDiv.remove();

    streamMessage((await res.json()).reply);
    loadHistory();
  } catch (err) {
    document.getElementById(typingId).innerHTML = `<div style="color:#f87171; padding: 10px;">Error connecting to Zet.</div>`;
  }
  isBusy = false; document.getElementById("sendBtn").disabled = false;
  setTimeout(() => input.focus(), 100);
}

function appendMessage(role, text) {
  const chat = document.getElementById("chat");
  const div = document.createElement("div");
  if (role === "assistant") role = "bot";
  div.className = `msg ${role}`;
  
  const contentHTML = role === "bot" ? marked.parse(text) : text.replace(/\n/g, "<br>");
  const encodedRaw = encodeURIComponent(text);

  div.innerHTML = `
    <div class="avatar ${role === 'user' ? 'user-avatar' : 'bot-avatar'}">
      <i class="fas ${role === 'user' ? 'fa-user' : 'fa-sparkles'}"></i>
    </div>
    <div class="content">${contentHTML}</div>
    <button class="msg-copy-btn" onclick="copyMessage(this)" data-raw="${encodedRaw}">
      <i class="far fa-copy"></i> Copy
    </button>
  `;

  chat.appendChild(div);
  div.querySelectorAll("pre code").forEach(block => hljs.highlightElement(block));
  chat.scrollTop = chat.scrollHeight;
  saveChatToLocal();
}

function appendTyping() {
  const chat = document.getElementById("chat");
  const id = "typing-" + Date.now();
  const div = document.createElement("div");
  div.className = "msg bot"; div.id = id;
  div.innerHTML = `
    <div class="avatar bot-avatar"><i class="fas fa-sparkles"></i></div>
    <div class="content"><div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div></div>
  `;
  chat.appendChild(div); chat.scrollTop = chat.scrollHeight;
  return id;
}

function streamMessage(fullText) {
  const chat = document.getElementById("chat");
  const div = document.createElement("div");
  div.className = "msg bot"; 
  div.innerHTML = `
    <div class="avatar bot-avatar"><i class="fas fa-sparkles"></i></div>
    <div class="content"></div>
    <button class="msg-copy-btn" onclick="copyMessage(this)" data-raw="${encodeURIComponent(fullText)}" style="display: none;">
      <i class="far fa-copy"></i> Copy
    </button>
  `;
  chat.appendChild(div);
  
  const contentDiv = div.querySelector(".content");
  const copyBtn = div.querySelector(".msg-copy-btn");
  let index = 0;
  
  const interval = setInterval(() => {
    contentDiv.innerText = fullText.slice(0, index); 
    chat.scrollTop = chat.scrollHeight;
    index += 5; 
    
    if (index > fullText.length) {
      clearInterval(interval);
      contentDiv.innerHTML = marked.parse(fullText);
      copyBtn.style.display = 'flex'; // Show the copy button when finished streaming
      saveChatToLocal();
      div.querySelectorAll("pre code").forEach(block => hljs.highlightElement(block));
      chat.scrollTop = chat.scrollHeight;
    }
  }, 10);
}

  </script>

</body>
</html>
